<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Rápido: Diluição de Medicamentos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #0056b3;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border: #e0e0e0;
            --accent: #d1ecf1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 25px; }
        h1 { color: var(--primary); margin-bottom: 5px; }
        
        /* Legenda */
        .legend-container {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 15px; margin-bottom: 20px; font-size: 13px;
        }
        .legend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 5px; }
        
        /* Busca e Loading */
        #searchInput {
            width: 100%; padding: 15px; border: 2px solid var(--border);
            border-radius: 8px; margin-bottom: 20px; font-size: 16px;
        }
        #loading { text-align: center; padding: 20px; display: block; color: var(--primary); font-weight: bold; }

        /* Accordion */
        .accordion-item {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 8px; margin-bottom: 10px; overflow: hidden;
        }
        .accordion-header {
            padding: 15px 20px; cursor: pointer; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
        }
        .accordion-header:hover { background: #f8f9fa; }
        .accordion-header::after { content: '\25BC'; font-size: 12px; transition: 0.3s; }
        .accordion-item.active .accordion-header::after { transform: rotate(-180deg); }
        
        .accordion-content { max-height: 0; overflow: hidden; transition: 0.3s ease-out; background: #fafafa; }
        .accordion-item.active .accordion-content { max-height: 1500px; padding: 20px; border-top: 1px solid var(--border); }

        .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
        .detail-box { background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; }
        .detail-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; display: block; }
        .detail-value { font-size: 14px; font-weight: 500; }
        .obs-box { grid-column: 1 / -1; background: #fff3cd; border-color: #ffeeba; color: #856404; }

        @media (max-width: 600px) { .details-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Guia de Diluição HMG</h1>
        <p>Dados atualizados via Planilha Online</p>
    </header>

    <div class="legend-container">
        <div class="legend-grid">
            <div><strong>EV:</strong> Endovenosa</div>
            <div><strong>IM:</strong> Intramuscular</div>
            <div><strong>SF:</strong> Soro Fisiológico</div>
            <div><strong>SG:</strong> Soro Glicosado</div>
            <div><strong>AD:</strong> Água Destilada</div>
            <div><strong>TA:</strong> Temp. Ambiente</div>
        </div>
    </div>

    <input type="text" id="searchInput" placeholder="Buscar medicamento..." disabled>
    <div id="loading">⏳ Carregando dados da planilha...</div>
    <div class="accordion" id="accordionContainer"></div>
</div>

<script>
    // URL DA SUA PLANILHA
    const urlPlanilha = 'https://docs.google.com/spreadsheets/d/1H1FUB4f2YGNXOHVO510H8qh7Iyo25bMpWdxx6UTFDIc/edit?usp=sharing';

    let baseMedicamentos = [];

    // Função para carregar dados
    function carregarDados() {
        Papa.parse(urlPlanilha, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                baseMedicamentos = results.data;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('searchInput').disabled = false;
                renderAccordion(baseMedicamentos.slice(0, 10)); // Mostra os 10 primeiros
            },
            error: function(err) {
                document.getElementById('loading').innerHTML = "❌ Erro ao carregar planilha. Verifique o link.";
            }
        });
    }

    function renderAccordion(lista) {
        const container = document.getElementById('accordionContainer');
        container.innerHTML = lista.map((med, index) => `
            <div class="accordion-item" id="med-${index}">
                <div class="accordion-header" onclick="toggleItem('med-${index}')">${med.Nome || 'Sem Nome'}</div>
                <div class="accordion-content">
                    <div class="details-grid">
                        <div class="detail-box"><span class="detail-label">Via</span><span class="detail-value">${med.Via || '-'}</span></div>
                        <div class="detail-box"><span class="detail-label">Reconstituição</span><span class="detail-value">${med.Reconstituicao || '-'}</span></div>
                        <div class="detail-box"><span class="detail-label">Estabilidade Reconst.</span><span class="detail-value">${med.EstabilidadeReconstituicao || '-'}</span></div>
                        <div class="detail-box"><span class="detail-label">Diluente</span><span class="detail-value">${med.Diluente || '-'}</span></div>
                        <div class="detail-box"><span class="detail-label">Tempo Infusão</span><span class="detail-value">${med.TempoInfusao || '-'}</span></div>
                        <div class="detail-box"><span class="detail-label">Estabilidade Infusão</span><span class="detail-value">${med.EstabilidadeInfusao || '-'}</span></div>
                        <div class="detail-box"><span class="detail-label">Diluição Padrão</span><span class="detail-value">${med.DiluicaoPadrao || '-'}</span></div>
                        <div class="detail-box"><span class="detail-label">Ajuste Renal</span><span class="detail-value">${med.AjusteRenal || '-'}</span></div>
                        <div class="detail-box obs-box"><span class="detail-label">Observações</span><span class="detail-value">${med.Observacoes || '-'}</span></div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function toggleItem(id) {
        const item = document.getElementById(id);
        const isActive = item.classList.contains('active');
        document.querySelectorAll('.accordion-item').forEach(el => el.classList.remove('active'));
        if (!isActive) item.classList.add('active');
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const termo = e.target.value.toLowerCase();
        const filtrados = baseMedicamentos.filter(m => m.Nome.toLowerCase().includes(termo));
        renderAccordion(filtrados);
    });

    // Iniciar
    carregarDados();
</script>
</body>
</html>
