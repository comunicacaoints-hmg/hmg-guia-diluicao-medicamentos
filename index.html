        { name: "Naloxona", concentration: "0,4 mg/mL 1mL", via: "EV/IM/SC", reconstitution: "Não", diluent: "SF/SG", stability_diluted: "24h TA", renal_adjust: "Não", infusion_time: "Bolus (3-5 min)", obs: "Antídoto Opióides." },
        { name: "Neostigmina", concentration: "0,5 mg/mL", via: "EV/IM/SC", reconstitution: "Não", diluent: "Puro", stability_diluted: "Uso imediato", renal_adjust: "Não", infusion_time: "Lento", obs: "Reversão bloqueio neuromuscular." },
        { name: "Nitroglicerina", concentration: "5 mg/mL amp 5 mL", via: "EV", reconstitution: "Não", diluent: "SF/SG", stability_diluted: "24h TA", renal_adjust: "Não", infusion_time: "Infusão Contínua", obs: "Frasco sem PVC." },
        { name: "Nitroprussiato de Sódio", concentration: "25 mg/mL 2 mL", via: "EV", reconstitution: "Diluente próprio", diluent: "SG 5%", stability_diluted: "4h (Protegido)", renal_adjust: "Não", infusion_time: "Infusão Contínua", obs: "Fotossensível." },
        { name: "Omeprazol", concentration: "40 mg F/A", via: "EV", reconstitution: "Diluente Próprio", diluent: "SF/SG", stability_diluted: "4h TA", renal_adjust: "Não", infusion_time: "20-30 min", obs: "Uso do diluente próprio é preferencial." },
        { name: "Ondansetrona", concentration: "2 mg/mL amp 2 mL", via: "EV/IM", reconstitution: "Não", diluent: "SF/SG", stability_diluted: "12h SF / 6h SG", renal_adjust: "Não", infusion_time: "Lento (2-5 min)", obs: "Antiemético." },
        { name: "Oxacilina Sódica", concentration: "500 mg F/A", via: "EV/IM", reconstitution: "AD / SF", diluent: "SF/SG", stability_diluted: "6h TA", renal_adjust: "Não", infusion_time: "Lento (10 min)", obs: "Rápido causa convulsão." },
        { name: "Piperacilina + Tazobactam", concentration: "4,5g F/A", via: "EV", reconstitution: "20mL AD", diluent: "SF/SG", stability_diluted: "24h TA", renal_adjust: "Sim", infusion_time: "20-30 min", obs: "Ajuste na IR." },
        { name: "Polimixicina B", concentration: "500.000 UI F/A", via: "EV/IM/Intratecal", reconstitution: "AD ou SF", diluent: "SF/SG", stability_diluted: "24h TA", renal_adjust: "Sim", infusion_time: "60-90 min", obs: "IM causa dor severa." },
        { name: "Prometazina", concentration: "25 mg/mL amp 2 mL", via: "IM", reconstitution: "Não", diluent: "Não", stability_diluted: "-", renal_adjust: "Não", infusion_time: "IM Profundo", obs: "Não usar EV ou SC." },
        { name: "Rocurônio", concentration: "10 mg/mL 5 mL", via: "EV", reconstitution: "Não", diluent: "Puro ou SF/SG", stability_diluted: "24h TA", renal_adjust: "Não", infusion_time: "Bolus ou Contínua", obs: "Bloqueador Neuromuscular." },
        { name: "Solução de Manitol 20%", concentration: "bolsa 250 mL", via: "EV", reconstitution: "Não", diluent: "Pronto", stability_diluted: "-", renal_adjust: "Não", infusion_time: "Conforme prescrição", obs: "Não administrar com cristais." },
        { name: "Sulfametoxazol + Trimetoprima", concentration: "amp 5 mL", via: "EV", reconstitution: "Não", diluent: "SF/SG", stability_diluted: "6h (500mL)", renal_adjust: "Sim", infusion_time: "30-60 min", obs: "Ajuste na IR." },
        { name: "Sulfato de Magnésio 10%", concentration: "amp 10 mL", via: "EV/IM", reconstitution: "Não", diluent: "SF/SG", stability_diluted: "Uso Imediato", renal_adjust: "Não", infusion_time: "Lento", obs: "Risco de toxicidade." },
        { name: "Suxametônio", concentration: "100 mg F/A", via: "EV/IM", reconstitution: "AD", diluent: "SF/SG", stability_diluted: "24h TA", renal_adjust: "Não", infusion_time: "Bolus/Contínua", obs: "Risco hipertermia maligna." },
        { name: "Terbutalina", concentration: "0,5 mg/mL amp 1mL", via: "EV/SC", reconstitution: "Não", diluent: "SG 5%", stability_diluted: "12h TA", renal_adjust: "Não", infusion_time: "20-30 gotas/min", obs: "Não diluir em soluções salinas." },
        { name: "Tramadol, Cloridrato", concentration: "100 mg/2mL amp 2 mL", via: "EV/IM", reconstitution: "Não", diluent: "SF 0,9%", stability_diluted: "Descartar", renal_adjust: "Não", infusion_time: "Lento", obs: "Analgésico opióide." },
        { name: "Vancomicina", concentration: "500 mg F/A", via: "EV", reconstitution: "10mL AD", diluent: "SF/SG", stability_diluted: "24h TA", renal_adjust: "Sim", infusion_time: "60-120 min", obs: "Prevenção da 'Síndrome do Homem Vermelho'." },
        { name: "Vasopressina", concentration: "20Ul/mL amp 1mL", via: "EV/IM/SC", reconstitution: "Não", diluent: "SF/SG", stability_diluted: "24h TA", renal_adjust: "Não", infusion_time: "Contínua / Bolus", obs: "Concentração máxima 1 UI/mL." },
        { name: "Vitamina K", concentration: "10 mg/mL amp 1 mL", via: "IM", reconstitution: "Não", diluent: "Não", stability_diluted: "-", renal_adjust: "Não", infusion_time: "IM Profundo", obs: "Antídoto Cumarínicos (Varfarina)." }
    ];

    // ELEMENTOS DOM
    const listElement = document.getElementById('drug-list');
    const searchInput = document.getElementById('search-input');
    const noResults = document.getElementById('no-results');
    const listTitle = document.getElementById('list-title');

    // DELEGAÇÃO DE EVENTOS
    listElement.addEventListener('click', (e) => {
        const header = e.target.closest('.card-header');
        if (!header) return; 
        const card = header.parentElement;
        card.classList.toggle('active');
    });

    // FUNÇÃO DE RENDERIZAÇÃO
    function renderDrugs(filterText = '') {
        listElement.innerHTML = ''; 
        let filtered = [];

        // Lógica de visualização: Top 10 vs Busca
        if (filterText.trim() === '') {
            filtered = drugs.filter(drug => drug.isTop10);
            listTitle.textContent = "Principais Medicamentos";
            listTitle.style.display = 'block';
        } else {
            filtered = drugs.filter(drug =>
                drug.name.toLowerCase().includes(filterText.toLowerCase())
            );
            listTitle.textContent = `Resultados para "${filterText}"`;
            listTitle.style.display = 'block';
        }

        if (filtered.length === 0) {
            noResults.style.display = 'block';
            listTitle.style.display = 'none';
            return;
        } else {
            noResults.style.display = 'none';
        }

        const fragment = document.createDocumentFragment();

        filtered.forEach(drug => {
            const card = document.createElement('div');
            card.className = 'card';
            const renalClass = drug.renal_adjust === "Sim" ? "badge-renal-sim" : "badge-renal-nao";

            card.innerHTML = `
                <button class="card-header">
                    <span class="drug-name">${drug.name}</span>
                    <div class="badges">
                        <span class="badge badge-via">${drug.via}</span>
                        <span class="badge ${renalClass}">Renal: ${drug.renal_adjust}</span>
                    </div>
                </button>
                <div class="card-body">
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="label">Apresentação</span>
                            <span class="value">${drug.concentration}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">Reconstituição</span>
                            <span class="value">${drug.reconstitution}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">Diluente Padrão</span>
                            <span class="value">${drug.diluent}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">Estabilidade (Diluído)</span>
                            <span class="value">${drug.stability_diluted}</span>
                        </div>
                        <div class="info-item" style="grid-column: 1 / -1;">
                            <span class="label">Tempo de Infusão</span>
                            <span class="value">${drug.infusion_time}</span>
                        </div>
                    </div>
                    <div class="alert-box">
                        <strong>Observações:</strong> ${drug.obs}
                    </div>
                </div>
            `;
            fragment.appendChild(card);
        });
        
        listElement.appendChild(fragment);
    }

    // EVENT LISTENER DE BUSCA COM DEBOUNCE
    let timeoutId;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(timeoutId);
        timeoutId = setTimeout(() => {
            renderDrugs(e.target.value);
        }, 300);
    });

    // RENDERIZAÇÃO INICIAL
    renderDrugs();

</script>

</body>
</html>
